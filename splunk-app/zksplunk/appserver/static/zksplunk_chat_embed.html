<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #071018;
      --panel: #101820;
      --panel-2: #0c141d;
      --line: #263241;
      --text: #e6edf3;
      --muted: #95a3b3;
      --accent: #65A637;
      --danger: #DC4E41;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .shell {
      min-height: 560px;
      border: 1px solid var(--line);
      background: var(--bg);
      display: grid;
      grid-template-rows: auto 1fr auto;
    }
    .bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    .brand { color: var(--accent); font-weight: 800; }
    .status {
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
    }
    .boundary {
      color: var(--muted);
      background: var(--panel-2);
      border-bottom: 1px solid var(--line);
      padding: 8px 12px;
      font-size: 12px;
    }
    .log {
      overflow: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 520px;
    }
    .msg {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 11px 12px;
      border-radius: 6px;
      white-space: pre-wrap;
    }
    .msg.user {
      background: #0c1a25;
      border-color: #294862;
    }
    .who {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 5px;
    }
    .tag {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      text-transform: none;
      letter-spacing: 0;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 14px 0;
    }
    .chip {
      border: 1px dashed #334354;
      color: var(--muted);
      background: transparent;
      border-radius: 999px;
      padding: 5px 9px;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
    }
    .chip:hover { border-color: var(--accent); color: var(--text); }
    form {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: var(--panel);
    }
    input {
      flex: 1;
      min-width: 0;
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 10px 11px;
      font: inherit;
    }
    button.ask {
      border: 0;
      border-radius: 5px;
      padding: 10px 14px;
      background: var(--accent);
      color: #07120a;
      font-weight: 800;
      cursor: pointer;
    }
    button.ask:disabled { opacity: .5; cursor: default; }
    .error { color: #ffb3aa; }
    code { background: #071018; border: 1px solid #1b2a38; padding: 1px 4px; border-radius: 4px; }
    a { color: #8fd16b; }
  </style>
</head>
<body>
  <div class="shell">
    <div>
      <div class="bar">
        <span class="brand">ZKSplunk</span>
        <span>zkZap analyst</span>
        <span class="status" id="status">checking agent...</span>
      </div>
      <div class="boundary">
        Public infrastructure metadata only. Private Midnight state, witnesses, shielded parties, and shielded amounts are not read.
      </div>
      <div class="chips" id="chips">
        <button class="chip" type="button">Are the proof server, indexer, and node healthy right now?</button>
        <button class="chip" type="button">What changed in the last 15 minutes?</button>
        <button class="chip" type="button">Which component is most degraded and why?</button>
        <button class="chip" type="button">Did any alert rule condition become true?</button>
      </div>
    </div>
    <div class="log" id="log"></div>
    <form id="form">
      <input id="q" autocomplete="off" placeholder="Ask about Midnight component health..." />
      <button class="ask" id="send" type="submit">Ask</button>
    </form>
  </div>

  <script>
    const agentBase = new URLSearchParams(window.location.search).get('agent') || 'http://localhost:8787';
    const log = document.getElementById('log');
    const form = document.getElementById('form');
    const input = document.getElementById('q');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');

    function render(text) {
      const esc = String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
      return esc
        .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
        .replace(/`(.+?)`/g, '<code>$1</code>');
    }

    function add(who, text, tag) {
      const el = document.createElement('div');
      el.className = 'msg' + (who === 'You' ? ' user' : '');
      el.innerHTML = '<div class="who">' + who + (tag ? '<span class="tag">' + tag + '</span>' : '') + '</div>' + render(text);
      log.appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return el;
    }

    async function refreshStatus() {
      try {
        const r = await fetch(agentBase + '/api/health').then((res) => res.json());
        statusEl.textContent =
          (r.splunk && r.splunk.ok ? 'Splunk ok' : 'Splunk unavailable') +
          ' - ' + (r.mcpConfigured ? 'MCP' : 'REST') +
          ' - ' + (r.llm ? 'LLM on' : 'LLM off');
      } catch (e) {
        statusEl.innerHTML = '<span class="error">agent offline</span> - <a target="_blank" href="' + agentBase + '">' + agentBase + '</a>';
      }
    }

    async function ask(question) {
      add('You', question);
      input.value = '';
      sendBtn.disabled = true;
      const pending = add('zkZap', 'Analyzing Splunk evidence...');
      try {
        const r = await fetch(agentBase + '/api/ask', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ question }),
        }).then((res) => res.json());
        pending.remove();
        if (r.error) {
          add('zkZap', 'Error: ' + r.error, 'error');
        } else {
          const tag = [r.classification, r.evidenceSource, r.phrasedByLlm ? 'llm' : 'deterministic'].filter(Boolean).join(' - ');
          add('zkZap', r.markdown, tag);
        }
      } catch (e) {
        pending.remove();
        add('zkZap', 'Request failed: ' + e.message + '\n\nIf Splunk is running over HTTPS, the browser may block calls to http://localhost:8787. Run the agent behind HTTPS or proxy it through Splunk.', 'error');
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      const q = input.value.trim();
      if (q) ask(q);
    });

    document.getElementById('chips').addEventListener('click', (event) => {
      if (event.target.classList.contains('chip')) ask(event.target.textContent);
    });

    refreshStatus();
    setInterval(refreshStatus, 15000);
  </script>
</body>
</html>
