#
# ZKSplunk saved searches & alert rules.
#
# Shipped enabled but EMAIL-OFF. Each alert is tracked in Splunk's Triggered
# Alerts (alert.track = 1) so the demo works with no SMTP. To send email,
# enable action.email and set action.email.to in Splunk Web (Settings >
# Searches, reports, and alerts), or add SMTP under Settings > Server settings.
#
# Trigger model: each search filters down to only the alertable rows, so
# "number of results > 0" means the condition is true.
#

[ZKSplunk - Proof Server Outage]
search = index=zksplunk sourcetype="midnight:vitals" component="proof-server" type="midnight.vital.check" \
| stats latest(status) as status latest(message) as message latest(response_time_ms) as response_time_ms latest(_time) as last_seen \
| where status="critical"
cron_schedule = */1 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
enableSched = 1
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.severity = 5
alert.track = 1
action.email = 0
disabled = 0

[ZKSplunk - Proof Latency Degradation]
search = index=zksplunk sourcetype="midnight:vitals" component="proof-server" type="midnight.vital.check" earliest=-5m \
| stats perc95(response_time_ms) as p95_latency_ms count as samples \
| where samples >= 3 AND p95_latency_ms > 2000
cron_schedule = */1 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert.severity = 4
alert.track = 1
action.email = 0
disabled = 0

