[ZKSplunk - Connector Silence]
search = index=zksplunk sourcetype="zksplunk:connector" type="zksplunk.connector.status" earliest=-5m \
| stats latest(_time) as last_seen latest(failed_events_since_last_heartbeat) as failed_events_since_last_heartbeat latest(queued_events) as queued_events latest(average_latency_ms) as average_latency_ms \
| eval seconds_since_heartbeat=now()-last_seen \
| eval failed_events_since_last_heartbeat=coalesce(failed_events_since_last_heartbeat,0) \
| where seconds_since_heartbeat > 120 OR failed_events_since_last_heartbeat > 0 OR queued_events > 0
cron_schedule = */1 * * * *
dispatch.earliest_time = -10m
dispatch.latest_time = now
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert.severity = 4
alert.track = 1
action.email = 0
disabled = 0

# Failed deliveries can't be sent to HEC (HEC is what's down), so they are
# captured in the agent's JSONL sink and surfaced in the next connector
# heartbeat. The cumulative total remains visible, but only new failures since
# the previous heartbeat keep this alert active.
[ZKSplunk - HEC Delivery Failures]
search = index=zksplunk sourcetype="zksplunk:connector" (type="zksplunk.connector.status" OR (type="zksplunk.hec.delivery" send_status="retry")) earliest=-15m \
| stats max(failed_events_since_last_heartbeat) as failed_events_since_last_heartbeat count(eval(send_status="retry")) as retried_batches latest(_time) as last_seen \
| eval failed_events_since_last_heartbeat=coalesce(failed_events_since_last_heartbeat,0) \
| where failed_events_since_last_heartbeat > 0 OR retried_batches > 0
cron_schedule = */1 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert.severity = 4
alert.track = 1
action.email = 0
disabled = 0

[ZKSplunk - Critical Components Last 15m]
search = index=zksplunk earliest=-15m \
| where status="critical" OR severity="critical" \
| stats count as critical_events values(component) as components by type \
| where critical_events > 0
cron_schedule = */5 * * * *
dispatch.earliest_time = -15m
dispatch.latest_time = now
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert.severity = 5
alert.track = 1
action.email = 0
disabled = 0

[ZKSplunk - Any Critical Event Email]
search = index=zksplunk earliest=-2m latest=now (status="critical" OR severity="critical") \
| eval alert_time=strftime(_time,"%Y-%m-%d %H:%M:%S %Z") \
| eval component=mvindex(coalesce(component,"unknown"),0), type=mvindex(coalesce(type,"unknown"),0), status=mvindex(status,0), severity=mvindex(severity,0) \
| eval condition=coalesce(status,severity,"critical") \
| eval message=mvindex(message,0), error_message=mvindex(error_message,0), endpoint=mvindex(endpoint,0), error_name=mvindex(error_name,0), response_time_ms=mvindex(response_time_ms,0), http_status=mvindex(http_status,0), graphql_errors_count=mvindex(graphql_errors_count,0) \
| eval details=coalesce(message,error_message,"No message provided") \
| sort 0 -_time \
| dedup component type \
| table alert_time sourcetype type component condition status severity response_time_ms endpoint http_status graphql_errors_count error_name error_message message details total_events_failed queued_events average_latency_ms send_status hec_response_code
cron_schedule = */1 * * * *
dispatch.earliest_time = -2m
dispatch.latest_time = now
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert_type = number of events
alert.severity = 5
alert.digest_mode = 0
alert.track = 1
alert.suppress = 1
alert.suppress.fields = component,type
alert.suppress.period = 10m
actions = email
action.email = 1
action.email.to = apestchanker@gmail.com
action.email.subject = MIDNIGHT COMPONENT - CRITICAL CONDITION : $result.component$
action.email.message = ZKSplunk detected a CRITICAL Midnight component condition. Component: $result.component$; Type: $result.type$; Condition: $result.condition$; Time: $result.alert_time$; Sourcetype: $result.sourcetype$; Response time ms: $result.response_time_ms$; Endpoint: $result.endpoint$; HTTP status: $result.http_status$; GraphQL errors: $result.graphql_errors_count$; Connector failed events: $result.total_events_failed$; Connector queue: $result.queued_events$; Average latency ms: $result.average_latency_ms$; Send status: $result.send_status$; HEC response: $result.hec_response_code$; Error: $result.error_name$ $result.error_message$; Message: $result.message$; Details: $result.details$
action.email.sendresults = 1
action.email.inline = 1
action.email.format = table
action.email.include.results_link = 1
action.email.include.search = 1
action.email.include.view_link = 1
disabled = 0
