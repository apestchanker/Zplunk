[ZKSplunk - Block Height Stalled]
search = index=zksplunk sourcetype="midnight:chain" type="midnight.chain.block_latest" earliest=-5m \
| stats latest(block_height) as latest_height earliest(block_height) as first_height latest(block_age_seconds) as block_age_seconds count as samples \
| where samples >= 2 AND (latest_height=first_height OR block_age_seconds > 60)
cron_schedule = */1 * * * *
dispatch.earliest_time = -5m
dispatch.latest_time = now
enableSched = 1
counttype = number of events
