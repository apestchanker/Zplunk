#
# Search-time JSON field extraction for ZKSplunk sourcetypes.
#
# IMPORTANT: data arrives via the HEC /event endpoint, which already structures
# the event. Use KV_MODE=json (search-time) ONLY. Do NOT add
# INDEXED_EXTRACTIONS=json here — with HEC it double/triple-extracts every field
# (component, status, ...) into multivalue fields, which breaks dedup, stats,
# and color formatting in the dashboard. _time comes from the HEC envelope, so
# no TIME_PREFIX/TIME_FORMAT is needed either.
#
[midnight:vitals]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 10000

[midnight:chain]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 10000

[midnight:contracts]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 10000

[zksplunk:connector]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 10000

[zksplunk:relayer]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 10000

[zksplunk:onchain]
KV_MODE = json
SHOULD_LINEMERGE = false
TRUNCATE = 10000
EVAL-type = coalesce(type, event)
