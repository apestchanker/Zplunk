#
# ZKSplunk — Midnight monitoring app for Splunk Enterprise
# Install: copy this directory to $SPLUNK_HOME/etc/apps/zksplunk and restart Splunk.
#
[install]
is_configured = false
state = enabled

[ui]
is_visible = true
label = ZKSplunk

[launcher]
author = ZKSplunk
description = Monitors Midnight proof server, indexer, node, wallet, contracts, and the ZKSplunk connector. Public infrastructure metadata only - no private Midnight state.
version = 0.2.0

[package]
id = zksplunk
