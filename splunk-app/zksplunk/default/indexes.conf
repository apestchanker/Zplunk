#
# Dedicated index for ZKSplunk telemetry.
# Paths use $SPLUNK_DB so they resolve under your Splunk data directory.
#
[zksplunk]
homePath   = $SPLUNK_DB/zksplunk/db
coldPath   = $SPLUNK_DB/zksplunk/colddb
thawedPath = $SPLUNK_DB/zksplunk/thaweddb
# Local dev retention: 30 days is plenty for a demo.
frozenTimePeriodInSecs = 2592000
